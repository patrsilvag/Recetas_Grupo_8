<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
  <head>
    <title>Acceso Seguro - Grupo 8</title>
    <link rel="stylesheet" type="text/css" th:href="@{/login.css}" />
  </head>

  <body>
    <div class="login-container">
      <h2>🔒 Autenticación de Auditoría</h2>

      <form onsubmit="ejecutarLogin(event)">
        <div>
          <label>
            Usuario:
            <input type="text" id="username" name="username" required />
          </label>
        </div>

        <div>
          <label>
            Password:
            <input type="password" id="password" name="password" required />
          </label>
        </div>

        <div>
          <input type="submit" value="Sign In" />
        </div>
      </form>
    </div>

    <script th:inline="javascript">
      async function ejecutarLogin(event) {

        event.preventDefault();

        console.log("Iniciando proceso de login...");

        const backendUrl = "http://localhost:8081";

        const userVal = document.getElementById("username").value;
        const passVal = document.getElementById("password").value;

        const body = JSON.stringify({
          username: userVal,
          password: passVal
        });

        try {

          const response = await fetch(`${backendUrl}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: body
          });

          if (response.status === 200) {

            const token = await response.text();

            localStorage.setItem("token", token);

            document.cookie =
              `token=${token}; path=/; max-age=3600; SameSite=Lax`;

            const urlParams = new URLSearchParams(window.location.search);

            const recetaId = urlParams.get("id");

            console.log("Login exitoso.");

            if (recetaId) {

              window.location.replace("/recetas/detalle?id=" + recetaId);

            } else {

              window.location.replace("/recetas/home");
            }

          } else {

            alert("Credenciales incorrectas en el servidor 8081");
          }

        } catch (error) {

          console.error("Error de conexión:", error);

          alert("No se pudo contactar al backend en el puerto 8081");
        }
      }
    </script>
  </body>
</html>
