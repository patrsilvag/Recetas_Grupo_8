<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - Seguridad y Calidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🍽️ Recetas App</a>
            <div class="d-flex">
                <a href="/recetas/home" class="btn btn-outline-light me-2">Volver al Dashboard</a>
                <button onclick="logout()" class="btn btn-danger">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5" sec:authorize="hasRole('ADMIN')">
        <h2 class="mb-4">🛡️ Panel de Administración de Usuarios</h2>
        
        <div id="alertArea"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Nombre Completo</th>
                            <th>Email</th>
                            <th>Rol Actual</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="container mt-5" sec:authorize="!hasRole('ADMIN')">
        <div class="alert alert-danger">
            <h3>Acceso Denegado</h3>
            <p>No tienes privilegios de administrador para ver este panel.</p>
            <a href="/recetas/home" class="btn btn-primary">Regresar al Inicio</a>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const BACKEND_URL = /*[[${backendUrl}]]*/ 'http://localhost:8081';
        /*]]>*/

        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');

            // Si el servidor permitió cargar la página, procedemos con los datos
            if (token) {
                cargarUsuarios(token);
            } else {
                window.location.href = '/recetas/login';
            }
        });

        function cargarUsuarios(token) {
            fetch(`${BACKEND_URL}/users`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                // 🛡️ Gestión de errores robusta desde el servidor
                if (response.status === 403) throw new Error("No tienes permiso (Forbidden)");
                if (!response.ok) throw new Error("Error de sesión o conexión");
                return response.json();
            })
            .then(users => {
                const tbody = document.getElementById('tablaUsuarios');
                if (!tbody) return; // Si el usuario no es admin, este elemento no existe
                
                tbody.innerHTML = '';
                // Dentro del fetch de usuarios, al construir las filas:
users.forEach(user => {
    // 🛡️ Si user.role es null o undefined, usamos 'USER'
    const safeRole = user.role || 'USER'; 
    
    const row = `
        <tr>
            <td>${user.id}</td>
            <td><strong>${user.username}</strong></td>
            <td>${user.nombreCompleto || 'N/A'}</td>
            <td>${user.email}</td>
            <td>
                <select class="form-select form-select-sm" onchange="cambiarRol(${user.id}, this.value)">
                    <option value="USER" ${safeRole.includes('USER') ? 'selected' : ''}>USER</option>
                    <option value="ADMIN" ${safeRole.includes('ADMIN') ? 'selected' : ''}>ADMIN</option>
                </select>
            </td>
            <td>
                <button onclick="eliminarUsuario(${user.id})" class="btn btn-sm btn-danger">Eliminar</button>
            </td>
        </tr>
    `;
    tbody.innerHTML += row;
});
            })
            .catch(error => {
                mostrarAlerta(error.message, 'danger');
                if (error.message.includes("403")) setTimeout(() => window.location.href = '/recetas/home', 2000);
            });
        }

        function cambiarRol(id, nuevoRol) {
            const token = localStorage.getItem('token');
            fetch(`${BACKEND_URL}/users/${id}/role?newRole=${nuevoRol}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => {
                if (response.ok) mostrarAlerta("Rol actualizado correctamente", 'success');
                else throw new Error("No se pudo actualizar el rol");
            })
            .catch(error => mostrarAlerta(error.message, 'danger'));
        }

        function eliminarUsuario(id) {
            if (!confirm("¿Estás seguro de eliminar este usuario?")) return;
            const token = localStorage.getItem('token');
            fetch(`${BACKEND_URL}/users/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(response => {
                if (response.ok) {
                    mostrarAlerta("Usuario eliminado", 'success');
                    cargarUsuarios(token);
                } else throw new Error("Error al eliminar");
            })
            .catch(error => mostrarAlerta(error.message, 'danger'));
        }

        function mostrarAlerta(mensaje, tipo) {
            const alertArea = document.getElementById('alertArea');
            if (alertArea) {
                alertArea.innerHTML = `<div class="alert alert-${tipo} alert-dismissible fade show">${mensaje}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/recetas/login';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
