<!DOCTYPE HTML> 
<html xmlns:th="http://www.thymeleaf.org"> 
<head>  
    <title>Panel de Control - Recetas</title>  
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" /> 
    <link rel="stylesheet" type="text/css" th:href="@{/recetas.css}">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem('token');
            
            // 1. Si no hay token, lo mandamos al login
            if (!token) {
                window.location.replace("/recetas/login");
                return;
            }

            // 2. Si hay token, mostramos las opciones
            document.getElementById('admin-panel').style.display = 'block';
        });

        function logout() {
            localStorage.removeItem('token');
            window.location.replace("/recetas/");
        }
    </script>
</head> 
<body> 
    <header style="background: #2c3e50; color: white; padding: 20px; text-align: center; position: relative;">
        <h1>🍎 Panel de Usuario Autenticado</h1>
        <button onclick="logout()" style="background:#e74c3c; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer; position: absolute; right: 20px; top: 25px;">Cerrar Sesión</button>
    </header>

    <div class="container" style="max-width: 800px; margin: 0 auto; padding: 40px;">
        
        <div id="welcome-message">
            <h2>¡Bienvenido al Sistema!</h2>
            <p>Has iniciado sesión correctamente. Ahora puedes gestionar tus contenidos.</p>
        </div>

        <div id="admin-panel" style="display: none; background: #f4f7f6; border-left: 5px solid #27ae60; padding: 20px; margin-top: 30px;">
            <h3 style="color: #2c3e50;">🍳 Gestión de Recetas</h3>
            <p>Como usuario registrado, puedes publicar tus propias creaciones saludables:</p>
            
            <div style="display: flex; justify-content: center; margin-top: 20px;">
                <a th:href="@{/crear-receta}" style="background: #27ae60; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; display: inline-block;">
                    ➕ Publicar Nueva Receta
                </a>
            </div>
        </div>

        <div style="margin-top: 40px; text-align: center;">
            <a th:href="@{/}" style="color: #7f8c8d;">← Volver al inicio público</a>
        </div>
    </div>
</body> 
</html>
